<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Te Amó 💌</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #FF0000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Dancing Script', cursive;
    }
    #glitter { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

    .scene {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 5;
    }

    /* ── HEART ── */
    .heart-container {
      position: relative;
      width: 240px;
      height: 230px;
      cursor: pointer;
      perspective: 700px;
      filter: drop-shadow(0 10px 30px rgba(0,0,0,0.4));
    }
    .heart-container:hover { filter: drop-shadow(0 14px 36px rgba(0,0,0,0.5)) brightness(1.06); }

    .half-wrap {
      position: absolute;
      top: 0;
      width: 120px;
      height: 230px;
      transition: transform 0.95s cubic-bezier(0.68,-0.4,0.27,1.35);
      transform-style: preserve-3d;
      overflow: hidden;
    }
    .half-wrap.left-half  { left: 0;  transform-origin: right center; }
    .half-wrap.right-half { right: 0; transform-origin: left center; }

    .heart-container.open .half-wrap.left-half  { transform: rotateY(-155deg); }
    .heart-container.open .half-wrap.right-half { transform: rotateY(155deg); }

    /* ── LETTER ── */
    .letter {
      position: absolute;
      top: 10px;
      left: 50%;
      width: 225px;
      background: linear-gradient(155deg, #fff9f2, #ffeae0);
      border-radius: 14px;
      padding: 22px 18px 18px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.3);
      border: 1.5px solid #f5c4b2;
      text-align: center;
      z-index: 1;
      opacity: 0;
      transform: translateX(-50%) translateY(20px) scale(0.82);
      pointer-events: none;
      transition: opacity 0.55s 0.5s, transform 0.65s 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }
    .heart-container.open ~ .letter {
      opacity: 1;
      transform: translateX(-50%) translateY(-248px) scale(1);
      pointer-events: auto;
    }
    .letter .ribbon { width:40px;height:4px;background:linear-gradient(90deg,#d95050,#ffaaaa);border-radius:2px;margin:0 auto 14px; }
    .letter .title  { font-family:'Dancing Script',cursive;font-size:2.15rem;color:#b81c28;margin-bottom:10px;line-height:1; }
    .letter .body   { font-family:'Playfair Display',serif;font-size:0.78rem;color:#5a2a2a;line-height:1.72;font-style:italic; }
    .letter .deco   { margin-top:12px;color:#d95050;font-size:1.1rem;letter-spacing:5px; }

    /* ── COUNTER ── */
    .counter-pill {
      margin-top: 18px;
      background: rgba(255,255,255,0.16);
      border: 1.5px solid rgba(255,255,255,0.42);
      border-radius: 50px;
      padding: 6px 22px;
      color: #fff;
      font-size: 0.86rem;
      font-family: 'Playfair Display', serif;
      letter-spacing: 0.04em;
    }

    /* ── HINT ── */
    .hint-circle {
      margin-top: 20px;
      width: 80px; height: 80px;
      border-radius: 50%;
      background: rgba(255,255,255,0.16);
      border: 2px solid rgba(255,255,255,0.48);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      animation: pulseHint 2s ease-in-out infinite;
      user-select: none;
      transition: background 0.2s, transform 0.15s;
    }
    .hint-circle:hover  { background: rgba(255,255,255,0.28); transform: scale(1.09); }
    .hint-circle:active { transform: scale(0.93); }
    .hint-circle span   { font-size:13px;color:#fff;text-align:center;line-height:1.4;font-family:'Playfair Display',serif; }
    @keyframes pulseHint {
      0%,100%{ box-shadow:0 0 0 0 rgba(255,255,255,0.45); }
      55%    { box-shadow:0 0 0 14px rgba(255,255,255,0); }
    }

    /* ── SPARKLES ── */
    .sparkle {
      position:fixed;pointer-events:none;z-index:30;font-size:1.5rem;
      animation:sparkleFly 1.1s ease-out forwards;
    }
    @keyframes sparkleFly {
      0%  { opacity:1;transform:translate(0,0) scale(1) rotate(0deg); }
      100%{ opacity:0;transform:translate(var(--dx),var(--dy)) scale(0.2) rotate(var(--dr)); }
    }
  </style>
</head>
<body>
<canvas id="glitter"></canvas>

<div class="scene">
  <div class="heart-container" id="heart">
    <div class="half-wrap left-half"><canvas id="cL" width="120" height="230"></canvas></div>
    <div class="half-wrap right-half"><canvas id="cR" width="120" height="230"></canvas></div>
  </div>

  <div class="letter" id="letter">
    <div class="ribbon"></div>
    <div class="title">Te Amó 💌</div>
    <div class="body">
      Cada día a tu lado es un regalo que atesoro con toda mi alma.
      Tu sonrisa ilumina mis días más oscuros y tu voz es la melodía
      que quiero escuchar para siempre. Eres mi hogar, mi aventura
      y mi paz. Gracias por existir exactamente como eres. 🌹
    </div>
    <div class="deco">♥ ♥ ♥</div>
  </div>

  <div class="counter-pill" id="counter">Toca el corazón ♥</div>
  <div class="hint-circle" id="hint"><span>Toca<br/>aquí ♡</span></div>
</div>

<script>
// ── DRAW HEART HALVES ──────────────────────────────────────────────
// Uses parametric heart: x=16sin³t, y=-(13cost-5cos2t-2cos3t-cos4t)
function buildHeartPath(ctx, cx, cy, scale, offsetX) {
  ctx.beginPath();
  for (let i = 0; i <= 360; i++) {
    const t = (i * Math.PI) / 180;
    const x = (cx + 16 * Math.pow(Math.sin(t), 3) * scale) + offsetX;
    const y =  cy - (13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t)) * scale;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
}

function drawHalf(id, side) {
  const canvas = document.getElementById(id);
  const ctx = canvas.getContext('2d');
  const W = 120, H = 230;

  // Heart center relative to full 240-wide space
  const HCX = 120,  HCY = 100, SCALE = 6.5;
  // For right half canvas, the heart starts at x=120 in full space → shift left by 120
  const offsetX = side === 'right' ? -120 : 0;

  ctx.clearRect(0, 0, W, H);

  // Clip to canvas bounds
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, 0, W, H);
  ctx.clip();

  // Gradient
  const grd = ctx.createLinearGradient(side==='left'?0:W, 0, side==='left'?W:0, H);
  grd.addColorStop(0,   '#ff7090');
  grd.addColorStop(0.4, '#e81530');
  grd.addColorStop(1,   '#990010');

  // Shadow
  ctx.shadowColor   = 'rgba(0,0,0,0.3)';
  ctx.shadowBlur    = 20;
  ctx.shadowOffsetY = 8;

  buildHeartPath(ctx, HCX, HCY, SCALE, offsetX);
  ctx.fillStyle = grd;
  ctx.fill();

  // Shine overlay
  ctx.shadowColor = 'transparent';
  const shx = side === 'left' ? 42 : 48;
  const shine = ctx.createRadialGradient(shx, 48, 2, shx+4, 55, 40);
  shine.addColorStop(0, 'rgba(255,255,255,0.45)');
  shine.addColorStop(1, 'rgba(255,255,255,0)');
  buildHeartPath(ctx, HCX, HCY, SCALE, offsetX);
  ctx.fillStyle = shine;
  ctx.fill();

  ctx.restore();
}

drawHalf('cL', 'left');
drawHalf('cR', 'right');

// ── GLITTER ────────────────────────────────────────────────────────
const gc = document.getElementById('glitter');
const gx = gc.getContext('2d');
let GW, GH, particles = [];
const rand = (a,b) => a + Math.random()*(b-a);

function resize() { GW = gc.width = innerWidth; GH = gc.height = innerHeight; }
resize();
window.addEventListener('resize', () => { resize(); initP(); });

function mkP(x, y) {
  return {
    x: x ?? rand(0,GW), y: y ?? rand(0,GH),
    sz: rand(2,5.5), vy: rand(0.3,1.2), vx: rand(-0.4,0.4),
    alpha: rand(0.5,1),
    color: `hsl(${rand(0,25)},100%,${rand(78,100)}%)`,
    shape: ['circle','star','diamond'][Math.floor(Math.random()*3)],
    rot: rand(0,Math.PI*2), rspd: rand(-0.05,0.05),
    tw: rand(0,Math.PI*2), tspd: rand(0.03,0.09)
  };
}
function initP() { particles=[]; const n=Math.floor(GW*GH/2800); for(let i=0;i<n;i++) particles.push(mkP()); }
initP();

function drawStar(c,r){ c.beginPath(); for(let i=0;i<10;i++){const a=(i*Math.PI)/5-Math.PI/2,rd=i%2?r*0.42:r; i?c.lineTo(rd*Math.cos(a),rd*Math.sin(a)):c.moveTo(rd*Math.cos(a),rd*Math.sin(a));} c.closePath(); }

// ── TOGGLE ────────────────────────────────────────────────────────
const heartEl   = document.getElementById('heart');
const counterEl = document.getElementById('counter');
const hintEl    = document.getElementById('hint');
let isOpen=false, count=0;
const msgs=['Toca el corazón ♥','¡Lo abriste! 💕','2 veces — curioso/a ✨','3 veces — ya te enamoraste 🥰','4 veces — definitivamente amor 💘','5 veces — ¡adicto/a! 🌹','Perdiste la cuenta igual que yo 💓'];

(function glitterLoop(){
  gx.clearRect(0,0,GW,GH);
  for(const p of particles){
    p.y-=p.vy; p.x+=p.vx; p.rot+=p.rspd; p.tw+=p.tspd;
    if(p.y<-8){p.y=GH+8;p.x=rand(0,GW);}
    if(p.x<-8)p.x=GW+8; if(p.x>GW+8)p.x=-8;
    const a=p.alpha*(0.45+0.55*Math.sin(p.tw));
    gx.save();
    gx.globalAlpha=a; gx.fillStyle=p.color;
    gx.shadowColor=p.color; gx.shadowBlur=7;
    gx.translate(p.x,p.y); gx.rotate(p.rot);
    if(p.shape==='circle'){gx.beginPath();gx.arc(0,0,p.sz/2,0,Math.PI*2);gx.fill();}
    else if(p.shape==='star'){drawStar(gx,p.sz);gx.fill();}
    else{gx.beginPath();gx.moveTo(0,-p.sz);gx.lineTo(p.sz*.55,0);gx.lineTo(0,p.sz);gx.lineTo(-p.sz*.55,0);gx.closePath();gx.fill();}
    gx.restore();
  }
  requestAnimationFrame(glitterLoop);
})();


function spawnSparkles(){
  const r=heartEl.getBoundingClientRect(), cx=r.left+r.width/2, cy=r.top+r.height/2;
  const emo=['✨','💖','🌸','⭐','💫','🌟','❤️'];
  for(let i=0;i<12;i++){
    const s=document.createElement('span'); s.className='sparkle';
    s.textContent=emo[Math.floor(Math.random()*emo.length)];
    const ang=rand(0,Math.PI*2), d=rand(75,175);
    s.style.left=cx+'px'; s.style.top=cy+'px';
    s.style.animationDelay=rand(0,.25)+'s';
    s.style.setProperty('--dx',Math.cos(ang)*d+'px');
    s.style.setProperty('--dy',Math.sin(ang)*d+'px');
    s.style.setProperty('--dr',rand(-200,200)+'deg');
    document.body.appendChild(s);
    s.addEventListener('animationend',()=>s.remove());
  }
}

function toggle(){
  isOpen=!isOpen;
  heartEl.classList.toggle('open',isOpen);
  if(isOpen){
    count++;
    spawnSparkles();
    const r=heartEl.getBoundingClientRect();
    for(let i=0;i<25;i++) particles.push(mkP(r.left+rand(0,r.width),r.top+rand(0,r.height)));
  }
  counterEl.textContent=msgs[Math.min(count,msgs.length-1)];
}

heartEl.addEventListener('click', toggle);
hintEl.addEventListener('click',  toggle);
</script>
</body>
</html>
